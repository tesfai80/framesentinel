<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrameSentinel - Video Verification Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #0b1220 50%, #020617 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { 
            max-width: 600px;
            width: 100%;
            background: #111827;
            border: 1px solid rgba(34, 197, 94, 0.2);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(34, 197, 94, 0.1);
        }
        h1 { 
            color: #E5E7EB;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }
        .subtitle { 
            color: #9CA3AF;
            margin-bottom: 30px;
            font-size: 14px;
            text-align: center;
        }
        .upload-area {
            border: 2px dashed rgba(34, 197, 94, 0.3);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(34, 197, 94, 0.05);
        }
        .upload-area:hover {
            background: rgba(34, 197, 94, 0.1);
            border-color: #22c55e;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
        }
        .upload-area.dragover {
            background: rgba(34, 197, 94, 0.15);
            border-color: #22c55e;
        }
        input[type="file"] { display: none; }
        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(34, 197, 94, 0.4);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .progress {
            height: 6px;
            background: rgba(34, 197, 94, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 20px;
            display: none;
        }
        .progress.active { display: block; }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #22c55e 0%, #16a34a 100%);
            transition: width 0.3s;
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
        }
        .status {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            display: none;
        }
        .status.active { display: block; }
        .status.info { background: rgba(34, 197, 94, 0.1); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.3); }
        .status.success { background: rgba(34, 197, 94, 0.1); color: #22C55E; border: 1px solid rgba(34, 197, 94, 0.3); }
        .status.error { background: rgba(239, 68, 68, 0.1); color: #EF4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        .result {
            background: rgba(34, 197, 94, 0.05);
            border: 1px solid rgba(34, 197, 94, 0.2);
            padding: 30px;
            border-radius: 12px;
            display: none;
            text-align: center;
        }
        .result.active { display: block; }
        .score {
            font-size: 72px;
            font-weight: bold;
            margin: 20px 0;
        }
        .score.verified { color: #22c55e; }
        .score.suspicious { color: #ffc107; }
        .score.high-risk { color: #dc3545; }
        .file-info {
            background: rgba(34, 197, 94, 0.05);
            border: 1px solid rgba(34, 197, 94, 0.2);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #9CA3AF;
            display: none;
        }
        .file-info.active { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ FrameSentinel</h1>
        <p class="subtitle">Video KYC Fraud Detection Test</p>

        <div class="upload-area" id="uploadArea">
            <p style="font-size: 48px; margin-bottom: 10px;">📹</p>
            <p style="font-size: 16px; font-weight: 600; margin-bottom: 5px; color: #E5E7EB;">
                Click to select video or drag & drop
            </p>
            <p style="font-size: 12px; color: #9CA3AF;">
                Supported: MP4, AVI, MOV, WEBM (max 100MB)
            </p>
            <input type="file" id="videoInput" accept="video/*">
        </div>

        <div class="file-info" id="fileInfo"></div>

        <div class="progress" id="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="status" id="status"></div>

        <div class="result" id="result"></div>

        <button class="btn-primary" id="uploadBtn" disabled>Upload & Verify</button>
    </div>

    <script>
        const API_URL = 'https://framesentinel-341068003893.europe-west3.run.app';
        const API_KEY = 'fs_live_fNEbGu6zv6DnrIOsqgDg2R7XDG_bVjjLGTWeTuCuavo';

        const uploadArea = document.getElementById('uploadArea');
        const videoInput = document.getElementById('videoInput');
        const fileInfo = document.getElementById('fileInfo');
        const uploadBtn = document.getElementById('uploadBtn');
        const progress = document.getElementById('progress');
        const progressBar = document.getElementById('progressBar');
        const status = document.getElementById('status');
        const result = document.getElementById('result');

        let selectedFile = null;

        // Click to upload
        uploadArea.onclick = () => videoInput.click();

        // Drag & drop
        uploadArea.ondragover = (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        };
        uploadArea.ondragleave = () => uploadArea.classList.remove('dragover');
        uploadArea.ondrop = (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files[0]) {
                handleFile(e.dataTransfer.files[0]);
            }
        };

        videoInput.onchange = (e) => {
            if (e.target.files[0]) handleFile(e.target.files[0]);
        };

        function handleFile(file) {
            selectedFile = file;
            const sizeMB = (file.size / 1024 / 1024).toFixed(2);
            fileInfo.innerHTML = `
                <strong>Selected:</strong> ${file.name}<br>
                <strong>Size:</strong> ${sizeMB} MB<br>
                <strong>Type:</strong> ${file.type}
            `;
            fileInfo.classList.add('active');
            uploadBtn.disabled = false;
        }

        uploadBtn.onclick = async () => {
            if (!selectedFile) return;

            try {
                uploadBtn.disabled = true;
                progress.classList.add('active');
                result.classList.remove('active');

                showStatus('Creating session...', 'info');

                // Create session
                const sessionRes = await fetch(`${API_URL}/api/v1/sessions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': API_KEY
                    },
                    body: JSON.stringify({
                        user_id: 'test_' + Date.now(),
                        device_metadata: {
                            browser: navigator.userAgent,
                            timestamp: new Date().toISOString()
                        }
                    })
                });

                const session = await sessionRes.json();
                const sessionId = session.session_id;

                showStatus('Uploading video...', 'info');

                // Upload video
                const formData = new FormData();
                formData.append('video', selectedFile);

                await new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();

                    xhr.upload.onprogress = (e) => {
                        if (e.lengthComputable) {
                            const percent = Math.round((e.loaded / e.total) * 100);
                            progressBar.style.width = percent + '%';
                        }
                    };

                    xhr.onload = () => {
                        if (xhr.status === 200) resolve();
                        else {
                            const error = JSON.parse(xhr.responseText);
                            reject(new Error(error.detail || 'Upload failed'));
                        }
                    };

                    xhr.onerror = () => reject(new Error('Network error'));

                    xhr.open('POST', `${API_URL}/api/v1/sessions/${sessionId}/upload`);
                    xhr.setRequestHeader('X-API-Key', API_KEY);
                    xhr.send(formData);
                });

                showStatus('Processing video... This may take a moment.', 'info');

                // Poll for result
                let attempts = 0;
                while (attempts < 30) {
                    await sleep(2000);

                    const resultRes = await fetch(`${API_URL}/api/v1/sessions/${sessionId}/result`, {
                        headers: { 'X-API-Key': API_KEY }
                    });

                    const data = await resultRes.json();

                    if (data.state === 'COMPLETED' || data.state === 'FAILED') {
                        displayResult(data);
                        break;
                    }

                    showStatus(`Processing... (${data.state})`, 'info');
                    attempts++;
                }

                if (attempts >= 30) {
                    showStatus('Processing timeout. Please try again.', 'error');
                }

            } catch (error) {
                showStatus('Error: ' + error.message, 'error');
                uploadBtn.disabled = false;
            } finally {
                progress.classList.remove('active');
            }
        };

        function showStatus(message, type) {
            status.textContent = message;
            status.className = 'status ' + type + ' active';
        }

        function displayResult(data) {
            status.classList.remove('active');

            const riskClass = data.risk_level?.toLowerCase() || 'suspicious';
            const scorePercent = Math.round((data.authenticity_score || 0) * 100);
            const riskText = {
                'verified': 'VERIFIED ✓',
                'suspicious': 'SUSPICIOUS ⚠',
                'high_risk': 'HIGH RISK ✗'
            }[riskClass] || 'UNKNOWN';

            result.innerHTML = `
                <div class="score ${riskClass}">${scorePercent}%</div>
                <h3 style="color: #E5E7EB;">${riskText}</h3>
                <p style="margin-top: 20px; color: #9CA3AF; font-size: 14px;">
                    Session ID: ${data.session_id.slice(0, 8)}...
                </p>
            `;
            result.classList.add('active');
            uploadBtn.disabled = false;
            uploadBtn.textContent = 'Upload Another Video';
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
    </script>
</body>
</html>
